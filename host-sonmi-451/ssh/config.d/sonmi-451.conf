# host-sonmi-451 SSH extensions (macOS + 1Password agent + personal aliases).
# Loaded via Include from the tag-base ~/.ssh/config.

Host *
  IdentityAgent "~/.ssh/sockets/1password/agent.sock"

# Remote bootstrap target. sshd is multiplexed onto :443 via sslh because
# OLS blocks outbound 22.
Host abu
  HostName 167.172.156.91
  Port 443
  User root
