[runtime]
output_max_bytes = 8000000
auto_instantiate = false
default_csv_encoding = "utf-8"
reactive_tests = true
watcher_on_save = "lazy"
std_stream_max_bytes = 1000000
default_auto_download = []
auto_reload = "off"
on_cell_change = "lazy"
default_sql_output = "auto"

[mcp]
presets = []

[mcp.mcpServers]

[language_servers.pylsp]
enable_pyflakes = false
enabled = true
enable_ruff = true
enable_flake8 = false
enable_pydocstyle = false
enable_mypy = true
enable_pylint = false

[snippets]
custom_paths = []
include_default_snippets = true

[experimental]

[ai]
rules = ""
mode = "manual"

[ai.models]
displayed_models = []
custom_models = []

[ai.custom_providers]

[package_management]
manager = "uv"

[diagnostics]
sql_linter = true

[display]
reference_highlighting = false
default_width = "medium"
theme = "light"
dataframes = "rich"
default_table_max_columns = 50
default_table_page_size = 10
cell_output = "below"
code_editor_font_size = 16

[completion]
copilot = false
activate_on_typing = true
signature_hint_on_typing = false

[keymap]
destructive_delete = true
preset = "default"

[keymap.overrides]

[formatting]
line_length = 79

[save]
format_on_save = false
autosave_delay = 1000
autosave = "after_delay"

[server]
follow_symlink = false
browser = "default"
