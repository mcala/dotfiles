# Reload Config
unbind r
bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display "Config reloaded."

# Leader
set -g prefix C-Space

# General Options
set -g mouse on
set -g set-clipboard on
set -g focus-events on
set -g history-limit 50000
set-window-option -g mode-keys vi

# Terminal: pick something the remote actually has terminfo for.
# Truecolor passthrough enabled for any client TERM that supports it.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm*:Tc"

set-option -g status-position top

# Window and Panes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off

# skip confirm step when killing pane
bind-key x kill-pane

## Splitting & Open in Current Path
bind-key | split-window -hc "#{pane_current_path}"
bind-key - split-window -vc "#{pane_current_path}"

# Rename windows
bind R command-prompt -I "#W" -p "Rename window:" "rename-window '%%'"

# Reorder Windows
bind-key -n C-S-h swap-window -t -1\; select-window -t -1
bind-key -n C-S-l swap-window -t +1\; select-window -t +1

# Plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_left "M-h"
set -g @vim_navigator_mapping_right "M-l"
set -g @vim_navigator_mapping_up "M-k"
set -g @vim_navigator_mapping_down "M-j"
set -g @vim_navigator_prefix_mapping_clear_screen ""

set -g @plugin 'tmux-plugins/tmux-yank'
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Resurrect + Continuum (useful for surviving SSH drops on the remote)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Simple, terminfo-safe status bar
set-option -g status "on"
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 60
set -g status-left "#[fg=green,bold]#S #[fg=default]| "
set -g status-right "#[fg=cyan]#(whoami)@#H #[fg=default]| %Y-%m-%d %H:%M"

run '~/.config/tmux/plugins/tpm/tpm'
